<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Animations Demo (CSS only)</title>
  <link rel="stylesheet" href="style/animations.css" />
</head>
<body>
  <header class="topbar">
    <h1>Animations Demo (CSS only)</h1>
  </header>

  <main class="wrap">
    <section class="controls">
      <div class="spinner" aria-hidden="true"></div>
      <p class="note">Loading spinner (CSS keyframes)</p>
    </section>

    <section class="grid">
      <article class="card reveal">
        <div class="img-wrap"><img src="https://via.placeholder.com/600x400" alt="Product 1"></div>
        <div class="body">
          <h3>Product 1</h3><p class="price">$19.99</p><button class="btn">Mua ngay</button>
        </div>
      </article>

      <article class="card reveal">
        <div class="img-wrap"><img src="https://via.placeholder.com/600x400/eee" alt="Product 2"></div>
        <div class="body">
          <h3>Product 2</h3><p class="price">$24.99</p><button class="btn">Mua ngay</button>
        </div>
      </article>

      <article class="card reveal">
        <div class="img-wrap"><img src="https://via.placeholder.com/600x400/ddd" alt="Product 3"></div>
        <div class="body">
          <h3>Product 3</h3><p class="price">$12.50</p><button class="btn">Mua ngay</button>
        </div>
      </article>

      <article class="card reveal">
        <div class="img-wrap"><img src="https://via.placeholder.com/600x400/ccc" alt="Product 4"></div>
        <div class="body">
          <h3>Product 4</h3><p class="price">$39.00</p><button class="btn">Mua ngay</button>
        </div>

      <article class="card reveal">
        <div class="img-wrap"><img src="https://via.placeholder.com/600x400/bbb" alt="Product 5"></div>

          <h3>Product 5</h3><p class="price">$9.99</p><button class="btn">Mua ngay</button>
        </div>
      </article>

      <article class="card reveal">
        <div class="img-wrap"><img src="https://via.placeholder.com/600x400/aaa" alt="Product 6"></div>
        <div class="body">
          <h3>Product 6</h3><p class="price">$29.99</p><button class="btn">Mua ngay</button>
        </div>
      </article>

      <article class="card reveal">
        <div class="img-wrap"><img src="https://via.placeholder.com/600x400/999" alt="Product 7"></div>
        <div class="body">
          <h3>Product 7</h3><p class="price">$14.50</p><button class="btn">Mua ngay</button>
        </div>

        <div class="img-wrap"><img src="https://via.placeholder.com/600x400/888" alt="Product 8"></div>

          <h3>Product 8</h3><p class="price">$49.00</p><button class="btn">Mua ngay</button>

</html>
