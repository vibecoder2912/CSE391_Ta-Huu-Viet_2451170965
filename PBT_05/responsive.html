<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Responsive Product Page</title>
  <link rel="stylesheet" href="style/responsive.css" />
</head>
<body>
  <header class="site-header">
    <div class="header-inner">
      <div class="logo">MY SHOP</div>

      <input type="checkbox" id="nav-toggle" class="nav-toggle-input" />
      <label for="nav-toggle" class="nav-toggle" aria-label="Mở menu">☰</label>

      <nav class="nav" id="main-nav" aria-label="Chính">
        <a href="#">Home</a>
        <a href="#">Products</a>
        <a href="#">About</a>
        <a href="#">Contact</a>
      </nav>
    </div>
  </header>

  <main class="content-grid">
    <aside class="sidebar" aria-label="Bộ lọc">
      <h4>Filters</h4>
      <div class="filters">
        <label><input type="checkbox" /> On sale</label>
        <label><input type="checkbox" /> Free ship</label>
        <label><input type="checkbox" /> In stock</label>
      </div>
    </aside>

    <section class="main">
      <div class="product-grid" aria-live="polite">
        <!-- 8 product cards (same as before) -->
        <article class="card">
          <img src="https://via.placeholder.com/800x600" alt="Product 1" />
          <div class="card-body">
            <h3>Product 1</h3>
            <p class="price">$19.99</p>
            <button class="buy">Mua</button>
          </div>
        </article>
        <!-- ...cards 2..8 (omitted for brevity) copy from previous file... -->
      </div>
    </section>

    <aside class="ads" aria-label="Quảng cáo">
      <div class="ad-box">AD</div>
    </aside>
  </main>

  <footer class="site-footer">
    <div class="footer-inner">© 2026 My Shop</div>
  </footer>
</body>
</html>
