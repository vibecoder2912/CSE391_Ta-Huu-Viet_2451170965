<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Grid Layout — E‑Commerce</title>
  <link rel="stylesheet" href="style/grid.css" />
</head>
<body>
  <div class="site-grid">
    <header class="site-header"> 
      <div class="header-inner">
        <div class="logo">SHOP</div>
        <nav class="top-nav">
          <a href="#">Trang chủ</a>
          <a href="#">Cửa hàng</a>
          <a href="#">Về chúng tôi</a>
        </nav>
      </div>
    </header>

    <section class="hero">
      <div class="hero-content">
        <h1>Giảm giá mùa xuân</h1>
        <p>Các sản phẩm nổi bật.</p>
      </div>
    </section>

    <aside class="sidebar">
      <h3>Filters</h3>
      <form>
        <label><input type="checkbox" /> Đang giảm giá</label><br/>
        <label><input type="checkbox" /> Miễn phí giao hàng</label><br/>
        <label><input type="checkbox" /> Trong kho</label><br/>
        <label><input type="checkbox" /> Đánh giá ≥ 4</label>
      </form>
    </aside>

    <main class="main">
      <div class="products">
        <article class="product featured">
          <img src="https://via.placeholder.com/800x480" alt="Featured product" />
          <h3>Featured Product</h3>
          <p class="price">$129.00</p>
        </article>

        <article class="product">
          <img src="https://via.placeholder.com/400x300" alt="Product 1" />
          <h4>Product 1</h4><p class="price">$29.00</p>
        </article>

        <article class="product">
          <img src="https://via.placeholder.com/400x300" alt="Product 2" />
          <h4>Product 2</h4><p class="price">$39.00</p>
        </article>

        <article class="product">
          <img src="https://via.placeholder.com/400x300" alt="Product 3" />
          <h4>Product 3</h4><p class="price">$19.50</p>
        </article>

        <article class="product">
          <img src="https://via.placeholder.com/400x300" alt="Product 4" />
          <h4>Product 4</h4><p class="price">$59.00</p>
        </article>

        <article class="product">
          <img src="https://via.placeholder.com/400x300" alt="Product 5" />
          <h4>Product 5</h4><p class="price">$24.00</p>
        </article>

        <article class="product">
          <img src="https://via.placeholder.com/400x300" alt="Product 6" />
          <h4>Product 6</h4><p class="price">$44.00</p>
        </article>
      </div>
    </main>

    <aside class="ads">
      <div class="ad-box">
        <img src="https://via.placeholder.com/300x600?text=AD" alt="Ad" />
      </div>
    </aside>

    <footer class="site-footer">
      <div class="footer-inner">© 2026 My Shop — Footer links</div>
    </footer>
  </div>
</body>
</html>
