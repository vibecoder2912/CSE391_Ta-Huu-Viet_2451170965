<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Flexbox Layout — Navbar & Cards</title>
  <link rel="stylesheet" href="style/flexbox.css">
</head>
<body>
  <header class="navbar">
    <div class="nav-left">LOGO</div>

    <nav class="nav-center" aria-label="Main">
      <a href="#">Home</a>
      <a href="#">Products</a>
      <a href="#">About</a>
    </nav>

    <div class="nav-right">
      <button class="btn outline">Login</button>
      <button class="btn">Register</button>
    </div>
  </header>

  <main class="container">
    <section class="cards-wrapper">
      <div class="card">
        <img src="https://via.placeholder.com/400x220" alt="">
        <div class="card-body">
          <h3>Product 1</h3>
          <p class="price">$19.99</p>
          <button class="buy">Buy</button>
        </div>
      </div>

      <div class="card">
        <img src="https://via.placeholder.com/400x220" alt="">
        <div class="card-body">
          <h3>Product 2</h3>
          <p class="price">$24.99</p>
          <button class="buy">Buy</button>
        </div>
      </div>

      <div class="card">
        <img src="https://via.placeholder.com/400x220" alt="">
        <div class="card-body">
          <h3>Product 3</h3>
          <p class="price">$12.50</p>
          <button class="buy">Buy</button>
        </div>
      </div>

      <div class="card">
        <img src="https://via.placeholder.com/400x220" alt="">
        <div class="card-body">
          <h3>Product 4</h3>
          <p class="price">$39.00</p>
          <button class="buy">Buy</button>
        </div>
      </div>

      <div class="card">
        <img src="https://via.placeholder.com/400x220" alt="">
        <div class="card-body">
          <h3>Product 5</h3>
          <p class="price">$9.99</p>
          <button class="buy">Buy</button>
        </div>
      </div>

      <div class="card">
        <img src="https://via.placeholder.com/400x220" alt="">
        <div class="card-body">
          <h3>Product 6</h3>
          <p class="price">$29.99</p>
          <button class="buy">Buy</button>
        </div>
      </div>

      <div class="card">
        <img src="https://via.placeholder.com/400x220" alt="">
        <div class="card-body">
          <h3>Product 7</h3>
          <p class="price">$14.50</p>
          <button class="buy">Buy</button>
        </div>
      </div>

      <div class="card">
        <img src="https://via.placeholder.com/400x220" alt="">
        <div class="card-body">
          <h3>Product 8</h3>
          <p class="price">$49.00</p>
          <button class="buy">Buy</button>
        </div>
      </div>
    </section>
  </main>
</body>
</html>
