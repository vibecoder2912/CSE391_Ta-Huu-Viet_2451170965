<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles/box_model.css">
    <title>Box Model Lab</title>
</head>
<body>
        <h2>2 hộp</h2>
        <div class="box-examples">
            <div class="box example1">
                <h3>Box 1 — content-box </h3>
                <p>Width set to 300px + 20px padding + 5px border on each side — total will exceed 300px.</p>
            </div>

            <div class="box example2">
                <h3>Box 2 — border-box</h3>
                <p>Width set to 300px includes padding and border — total stays 300px.</p>
            </div>
        </div>

        <h2>Layout 3 cột</h2>
        <div class="three-column-container">
            <aside class="col left">Left sidebar<br>250px</aside>
            <main class="col center">Main content<br>500px</main>
            <aside class="col right">Ads / Right<br>250px</aside>
        </div>
</body>
</html>
