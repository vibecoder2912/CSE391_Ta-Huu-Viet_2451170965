<!doctype html>
<html lang="vi">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Todo App</title>
    <link rel="stylesheet" href="style.css" />
</head>

<body>
    <main class="app">
        <section class="card">
            <header class="header">
                <h1>Todo App</h1>
                <p class="subtitle">Add, edit, filter, and persist with localStorage</p>
            </header>

            <form id="todoForm" class="todo-form">
                <input id="todoInput" type="text" placeholder="What needs to be done?" autocomplete="off" />
                <button type="submit">Add</button>
            </form>

            <div class="toolbar">
                <div class="filters" role="tablist" aria-label="Todo filters">
                    <button type="button" class="filter-btn active" data-filter="all">All</button>
                    <button type="button" class="filter-btn" data-filter="active">Active</button>
                    <button type="button" class="filter-btn" data-filter="completed">Completed</button>
                </div>

                <button type="button" id="clearCompletedBtn" class="ghost-btn">Clear completed</button>
            </div>

            <div class="summary">
                <span id="countText">0 items left</span>
            </div>

            <ul id="todoList" class="todo-list" aria-label="Todo items"></ul>
        </section>
    </main>

    <script src="app.js"></script>
</body>

</html>
