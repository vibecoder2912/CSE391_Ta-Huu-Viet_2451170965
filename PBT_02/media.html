<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <title>Document</title>
</head>
<body>
    <h1>Media Demo</h1>

    <section>
        <h2>Sản phẩm</h2>
        <figure>
            <img src="images/product1.jpg" alt="Áo thun nam màu xanh" loading="lazy" style="max-width:100%;height:auto;">
            <figcaption>Áo thun nam - Màu xanh</figcaption>
        </figure>

        <figure>
            <img src="images/product2.jpg" alt="Giày thể thao trắng" loading="lazy" style="max-width:100%;height:auto;">
            <figcaption>Giày thể thao - Trắng</figcaption>
        </figure>

        <figure>
            <img src="images/product3.jpg" alt="Balo du lịch màu xám" loading="lazy" style="max-width:100%;height:auto;">
            <figcaption>Balo du lịch - Xám</figcaption>
        </figure>
    </section>

    <section>
        <h2>Video Youtube</h2>
        <!-- YouTube embed -->
        <div style="max-width:560px;">
            <iframe width="560" height="315" src="https://www.youtube.com/embed/VQRLujxTm3c?si=0Bykgl22JPOgmKVC" title="YouTube video player" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe>

        <h3>Video</h3>
        <video controls poster="videos/poster.jpg" style="max-width:100%;height:auto;">
            <source src="videos/sample.mp4" type="video/mp4">
            <source src="videos/sample.webm" type="video/webm">
        </video>
    </section>

    <section>
        <h2>Audio</h2>
        <audio controls>
            <source src="audio/intro.mp3" type="audio/mpeg">
        </audio>
    </section>

    <section>
        <h2>SVG</h2>
        <svg width="120" height="80" viewBox="0 0 120 80" xmlns="http://www.w3.org/2000/svg" aria-labelledby="logoTitle logoDesc" role="img">
            <title id="logoTitle">Logo đơn giản</title>
            <desc id="logoDesc">Hình tròn màu xanh kèm ô vuông màu cam</desc>
            <rect x="70" y="10" width="40" height="40" fill="#ff8c42" />
            <circle cx="40" cy="30" r="28" fill="#4aa3df" />
        </svg>
    </section>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>

</body>
</html>
