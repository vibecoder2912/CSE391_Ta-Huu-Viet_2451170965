<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather App - Bootstrap 5</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body class="d-flex align-items-center justify-content-center p-3">

    <div class="card weather-card shadow-lg w-100" style="max-width: 420px;">
        <div class="card-body p-4">

            <h2 class="card-title text-center text-primary fw-bold mb-4">
                <i class="fa-solid fa-cloud-sun text-warning me-2"></i>Weather App
            </h2>

            <form id="search-form" class="mb-3">
                <div class="input-group">
                    <input type="text" id="city-input" class="form-control"
                        placeholder="Nhập tên thành phố (vd: Hanoi...)" required>
                    <button class="btn btn-primary fw-semibold" type="submit">
                        <i class="fa-solid fa-magnifying-glass me-1"></i>Tìm
                    </button>
                </div>
            </form>

            <div class="mb-4">
                <h6 class="text-muted text-uppercase small fw-bold mb-2">Lịch sử tìm kiếm</h6>
                <div id="history-container" class="d-flex flex-wrap gap-2">
                </div>
            </div>

            <hr class="text-muted opacity-25 my-3">

            <div id="weather-display" class="d-flex align-items-center justify-content-center"
                style="min-height: 250px;">

                <div id="state-initial" class="text-center text-muted py-4">
                    <i class="fa-solid fa-magnifying-glass-location display-4 mb-3 d-block text-secondary"></i>
                    <p class="mb-0">Nhập một địa điểm để xem thời tiết</p>
                </div>

                <div id="state-loading" class="text-center text-primary d-none py-4">
                    <div class="spinner-border text-primary mb-3" role="status" style="width: 3rem; height: 3rem;">
                        <span class="visually-hidden">Loading...</span>
                    </div>
                    <p class="fw-medium mb-0">Đang tải dữ liệu thời tiết...</p>
                </div>

                <div id="state-success" class="text-center d-none w-100">
                    <h3 id="weather-city" class="fw-black text-dark mb-0">Hà Nội</h3>
                    <p id="weather-country" class="text-muted small text-uppercase fw-bold mb-3">VN</p>

                    <div class="d-flex align-items-center justify-content-center mb-3 gap-3">
                        <span id="weather-icon" class="display-3 text-warning">
                        </span>
                        <div class="text-start">
                            <span id="weather-temp" class="display-4 fw-bold text-dark">28</span><span
                                class="h2 text-primary fw-bold">°C</span>
                        </div>
                    </div>

                    <p id="weather-desc" class="h5 text-secondary text-capitalize mb-4">Trời nhiều mây</p>

                    <div class="row g-2 bg-light p-3 rounded-4 border">
                        <div class="col-6 d-flex align-items-center ps-3">
                            <i class="fa-solid fa-droplet text-info fs-3 me-3 text-center" style="width: 30px;"></i>
                            <div class="text-start">
                                <span class="text-muted d-block small fw-bold text-uppercase"
                                    style="font-size: 0.65rem">Độ ẩm</span>
                                <strong id="weather-humidity" class="text-dark">80%</strong>
                            </div>
                        </div>
                        <div class="col-6 d-flex align-items-center ps-3 border-start">
                            <i class="fa-solid fa-wind text-success fs-3 me-3 text-center" style="width: 30px;"></i>
                            <div class="text-start">
                                <span class="text-muted d-block small fw-bold text-uppercase"
                                    style="font-size: 0.65rem; ">Tốc độ gió</span>
                                <strong id="weather-wind" class="text-dark">12 km/h</strong>
                            </div>
                        </div>
                    </div>
                </div>

                <div id="state-error" class="text-center text-danger d-none px-3 py-4">
                    <i class="fa-solid fa-circle-exclamation display-4 mb-3 d-block text-danger opacity-75"></i>
                    <p id="error-message" class="fw-semibold small mb-0">Không tìm thấy thành phố hoặc mất kết nối mạng!
                    </p>
                </div>

            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <script src="app.js"></script>
</body>

</html>
