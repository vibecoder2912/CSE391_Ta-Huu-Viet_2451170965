<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Directory (CRUD)</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
</head>
<body class="bg-light min-vh-100 py-4">

    <div class="container">
        <div class="d-flex flex-column flex-md-row justify-content-between align-items-md-center gap-3 mb-4">
            <div>
                <h1 class="fw-bold text-dark m-0"><i class="fa-solid fa-users text-primary me-2"></i>User Directory</h1>
                <p class="text-muted m-0">Quản lý danh sách thành viên hệ thống (CRUD & Clean Architecture)</p>
            </div>
            <button class="btn btn-primary fw-semibold px-4 py-2" data-bs-toggle="modal" data-bs-target="#userModal" onclick="openAddModal()">
                <i class="fa-solid fa-user-plus me-2"></i>Thêm thành viên
            </button>
        </div>

        <div class="card shadow-sm border-0 mb-4">
            <div class="card-body p-3">
                <div class="input-group">
                    <span class="input-group-text bg-white border-end-0 text-muted">
                        <i class="fa-solid fa-magnifying-glass"></i>
                    </span>
                    <input 
                        type="text" 
                        id="search-input" 
                        class="form-control border-start-0 ps-0" 
                        placeholder="Tìm kiếm thành viên theo tên hoặc email..."
                    >
                </div>
            </div>
        </div>

        <div id="users-container" class="row g-4">
            </div>
    </div>

    <div class="modal fade" id="userModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content border-0 shadow">
                <div class="modal-header bg-light">
                    <h5 class="modal-title fw-bold" id="modal-title">Thêm thành viên mới</h5>
                    <button type="button" class="btn-close" data-bs-delete="modal" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <form id="user-form">
                    <div class="modal-body p-4">
                        <input type="hidden" id="form-user-id">
                        <div class="mb-3">
                            <label class="form-label small fw-bold text-uppercase text-muted">Họ và tên</label>
                            <input type="text" id="form-name" class="form-control" required placeholder="Nguyễn Văn A">
                        </div>
                        <div class="mb-3">
                            <label class="form-label small fw-bold text-uppercase text-muted">Địa chỉ Email</label>
                            <input type="email" id="form-email" class="form-control" required placeholder="name@example.com">
                        </div>
                        <div class="mb-3">
                            <label class="form-label small fw-bold text-uppercase text-muted">Số điện thoại</label>
                            <input type="text" id="form-phone" class="form-control" required placeholder="090-xxx-xxxx">
                        </div>
                        <div class="mb-0">
                            <label class="form-label small fw-bold text-uppercase text-muted">Công ty / Tổ chức</label>
                            <input type="text" id="form-company" class="form-control" required placeholder="Công ty Công nghệ ABC">
                        </div>
                    </div>
                    <div class="modal-footer bg-light border-top-0">
                        <button type="button" class="btn btn-secondary fw-medium" data-bs-dismiss="modal">Hủy</button>
                        <button type="submit" id="btn-submit-form" class="btn btn-primary fw-semibold px-4">Lưu lại</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <div class="toast-container position-fixed bottom-0 end-0 p-3">
        <div id="live-toast" class="toast align-items-center text-white border-0 shadow" role="alert" aria-live="assertive" aria-atomic="true">
            <div class="d-flex">
                <div class="toast-body d-flex align-items-center gap-2">
                    <i id="toast-icon" class="fa-solid"></i>
                    <span id="toast-message">Thông báo ở đây...</span>
                </div>
                <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast" aria-label="Close"></button>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <script src="app.js"></script>
</body>
</html>
