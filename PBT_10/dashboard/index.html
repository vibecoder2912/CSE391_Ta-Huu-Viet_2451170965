<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multi-API Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-light min-vh-100 py-4">

    <div class="container">
        <div class="d-flex flex-column flex-sm-row justify-content-between align-items-sm-center gap-3 border-bottom pb-3 mb-4">
            <div>
                <h1 class="fw-bold m-0 text-dark"><i class="fa-solid fa-chart-pie text-primary me-2"></i>Tổng hợp Dashboard</h1>
                <p id="fetch-time-info" class="text-muted m-0 small italic">Chưa có dữ liệu. Vui lòng bấm làm mới.</p>
            </div>
            <div>
                <button id="btn-refresh" class="btn btn-primary fw-semibold px-4 py-2" onclick="loadDashboard()">
                    <i class="fa-solid fa-rotate me-2"></i>Làm mới tất cả
                </button>
            </div>
        </div>

        <div class="row g-4">
            
            <div class="col-12 col-lg-4">
                <div class="card h-100 border-0 shadow-sm widget-card" id="widget-0">
                    <div class="card-header bg-white border-0 pt-3 fw-bold text-secondary d-flex align-items-center justify-content-between">
                        <span><i class="fa-solid fa-cloud-sun text-warning me-2"></i>Thời tiết Hà Nội</span>
                        <span class="badge bg-light text-muted border font-monospace small">API 1</span>
                    </div>
                    <div class="card-body d-flex flex-column justify-content-center align-items-center text-center p-4 content-area">
                        </div>
                </div>
            </div>

            <div class="col-12 col-lg-4">
                <div class="card h-100 border-0 shadow-sm widget-card" id="widget-1">
                    <div class="card-header bg-white border-0 pt-3 fw-bold text-secondary d-flex align-items-center justify-content-between">
                        <span><i class="fa-solid fa-earth-asia text-success me-2"></i>Thông tin Việt Nam</span>
                        <span class="badge bg-light text-muted border font-monospace small">API 2</span>
                    </div>
                    <div class="card-body d-flex flex-column justify-content-center align-items-center p-4 content-area">
                        </div>
                </div>
            </div>

            <div class="col-12 col-lg-4">
                <div class="card h-100 border-0 shadow-sm widget-card" id="widget-2">
                    <div class="card-header bg-white border-0 pt-3 fw-bold text-secondary d-flex align-items-center justify-content-between">
                        <span><i class="fa-solid fa-dog text-danger me-2"></i>Hình cún ngẫu nhiên</span>
                        <span class="badge bg-light text-muted border font-monospace small">API 3</span>
                    </div>
                    <div class="card-body d-flex flex-column justify-content-center align-items-center p-4 content-area">
                        </div>
                </div>
            </div>

        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <script src="app.js"></script>
</body>
</html>
